<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contact - The Toy Outpost</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'Rustique';
            src: url('assets/fonts/Rustique-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --dust: #D4A373;
            --void: #0A0E27;
            --star: #F4E4C1;
            --rust: #B85C38;
            --text-secondary: rgba(212, 163, 115, 0.9);
            --text-muted: rgba(244, 228, 193, 0.94);
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--void);
            color: var(--star);
            min-height: 100vh;
            position: relative;
            font-size: 1.0625rem;
            line-height: 1.65;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: var(--star);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .dust-particle {
            position: absolute;
            background: var(--dust);
            opacity: 0.1;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, -30px); }
            50% { transform: translate(-30px, 50px); }
            75% { transform: translate(20px, -40px); }
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: blur(8px);
            background: rgba(10, 14, 39, 0.82);
            border-bottom: 1px solid rgba(212, 163, 115, 0.25);
        }

        .site-nav {
            position: relative;
            max-width: 980px;
            margin: 0 auto;
            padding: 0.85rem 1.25rem;
            padding-left: max(1.25rem, env(safe-area-inset-left));
            padding-right: max(1.25rem, env(safe-area-inset-right));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.9rem;
        }

        .nav-brand {
            font-family: 'Rustique', 'Orbitron', sans-serif;
            color: var(--star);
            text-decoration: none;
            font-size: 0.875rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8125rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--star);
        }

        .nav-toggle {
            display: none;
            border: 1px solid rgba(212, 163, 115, 0.45);
            background: transparent;
            color: var(--dust);
            padding: 0.35rem 0.55rem;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 60px);
            min-height: calc(100dvh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.25rem 4rem;
            padding-left: max(1.25rem, env(safe-area-inset-left));
            padding-right: max(1.25rem, env(safe-area-inset-right));
            text-align: center;
        }

        .logo img {
            display: block;
            max-width: min(90vw, 620px);
            height: auto;
            filter: drop-shadow(0 0 12px rgba(244, 228, 193, 0.6))
                    drop-shadow(0 0 28px rgba(212, 163, 115, 0.35))
                    drop-shadow(0 0 48px rgba(184, 92, 56, 0.2))
                    sepia(0.06) saturate(1.08);
        }

        .tagline {
            font-size: clamp(0.9rem, 2.1vw, 1.08rem);
            color: #e0bc8c;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin: 0.7rem 0 0.7rem;
            font-family: 'Rustique', 'Orbitron', sans-serif;
        }

        .page-title {
            font-family: 'Rustique', 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
        }

        .message {
            max-width: 620px;
            font-size: clamp(1.05rem, 2.4vw, 1.15rem);
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        .email-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 520px;
            width: 100%;
        }

        .email-label {
            font-size: 0.875rem;
            color: #e0bc8c;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.35rem;
            text-align: center;
        }

        .email-label .optional {
            font-weight: 400;
            color: var(--text-secondary);
            text-transform: none;
            letter-spacing: 0.05em;
        }

        .email-input {
            width: 100%;
            padding: 1.1rem 1.2rem;
            background: rgba(212, 163, 115, 0.1);
            border: 2px solid var(--dust);
            border-radius: 0;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            color: var(--star);
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
        }

        .email-input::placeholder {
            color: rgba(244, 228, 193, 0.5);
            letter-spacing: 0.1em;
        }

        .sms-consent {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            text-align: left;
        }

        .sms-consent input[type="checkbox"] {
            flex-shrink: 0;
            width: 1.1rem;
            height: 1.1rem;
            margin-top: 0.2rem;
            accent-color: var(--rust);
            cursor: pointer;
        }

        .sms-consent-label {
            font-size: 0.8125rem;
            line-height: 1.55;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .sms-consent-label a {
            color: var(--dust);
            text-decoration: underline;
        }

        .submit-btn {
            padding: 1.1rem 2rem;
            background: transparent;
            border: 2px solid var(--rust);
            color: var(--rust);
            font-family: 'Rustique', 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            color: var(--void);
            background: var(--rust);
        }

        .footer-links {
            margin-top: 1.5rem;
            text-align: center;
        }

        .footer-contact-link {
            display: inline-block;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .footer-contact-link:hover {
            color: var(--dust);
        }

        .footer-link {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: var(--dust);
        }

        .secondary-link {
            display: inline-block;
            margin-top: 0.6rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-decoration: none;
            transition: color 0.2s ease;
            text-transform: uppercase;
        }

        .secondary-link:hover {
            color: var(--dust);
        }

        .social-links {
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .social-links a {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: var(--dust);
        }

        .footer-info {
            margin-top: 1.5rem;
            text-align: center;
            opacity: 1;
        }

        .coordinates {
            font-family: 'Space Mono', monospace;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.16em;
        }

        @media (max-width: 768px) {
            .nav-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .nav-links {
                display: none;
                position: absolute;
                z-index: 40;
                top: calc(100% + 0.45rem);
                left: max(1.25rem, env(safe-area-inset-left));
                right: max(1.25rem, env(safe-area-inset-right));
                flex-direction: column;
                align-items: flex-start;
                gap: 0.7rem;
                padding: 0.9rem;
                background: rgba(10, 14, 39, 0.96);
                border: 1px solid rgba(212, 163, 115, 0.35);
            }

            .nav-links.open {
                display: flex;
            }

            .nav-links a {
                width: 100%;
                font-size: 0.875rem;
                padding: 0.2rem 0;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav" aria-label="Main">
            <a href="/" class="nav-brand">The Toy Outpost</a>
            <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-nav-links" aria-label="Toggle navigation">&#9776;</button>
            <div class="nav-links" id="main-nav-links">
                <a href="/">Home</a>
                <a href="/grand-opening.html">Grand Opening</a>
                <a href="/sell-your-toys.html">Sell Your Toys</a>
                <a href="/contact.html">Contact</a>
                <a href="/privacy-and-terms.html">Privacy &amp; Terms</a>
            </div>
        </nav>
    </header>

    <div class="stars" id="starfield"></div>

    <div class="container">
        <a href="/" class="logo"><img src="assets/logo-horizontal.png" alt="The Toy Outpost"></a>
        <div class="tagline">Where Legends Never Fade</div>
        <h1 class="page-title">Join the Expedition</h1>
        <p class="message">Sign up for updates and let us know if you want SMS alerts too.</p>

        <form class="email-form" id="emailForm" name="signup" method="POST" netlify action="/thank-you.html">
            <input type="hidden" name="form-name" value="signup">
            <label for="nameInput" class="email-label">Your name</label>
            <input type="text" class="email-input" placeholder="YOUR NAME" required id="nameInput" name="name" autocomplete="name">

            <label for="emailInput" class="email-label">Your email</label>
            <input type="email" class="email-input" placeholder="TRANSMIT YOUR COORDINATES" required id="emailInput" name="email" autocomplete="email">

            <label for="phoneInput" class="email-label">Phone number <span class="optional">(optional)</span></label>
            <input type="tel" class="email-input" placeholder="YOUR PHONE NUMBER" id="phoneInput" name="phone" autocomplete="tel">

            <div class="sms-consent">
                <input type="checkbox" id="smsOptIn" name="sms_opt_in" value="yes">
                <label for="smsOptIn" class="sms-consent-label">By checking this box I consent to receive an SMS text message to my cell number provided above for Customer care, Account notification and marketing messages from The Toy Outpost Company, LLC. I understand that I can opt-out of receiving text messages at any time by responding with [STOP] I can reply with [HELP] to get help. Message frequency may vary. I understand that message and data rates may apply. See The Toy Outpost Company LLC's Terms of Service and <a href="/privacy-and-terms.html">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="submit-btn">Join the Expedition</button>
        </form>

        <div class="footer-info">
            <div class="coordinates">SECTOR 7-G // STATUS: INBOUND</div>
            <nav class="social-links" aria-label="Social media">
                <a href="https://www.facebook.com/toyoutpostco" target="_blank" rel="noopener noreferrer">Facebook</a>
                <a href="https://www.instagram.com/toyoutpostco" target="_blank" rel="noopener noreferrer">Instagram</a>
            </nav>
            <a href="/sell-your-toys.html" class="secondary-link">Sell Your Toys</a>
            <a href="/contact.html" class="footer-contact-link">Contact</a>
            <a href="/privacy-and-terms.html" class="footer-link">Privacy &amp; Terms</a>
        </div>
    </div>

    <script>
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (navToggle && navLinks) {
            navToggle.addEventListener('click', () => {
                const expanded = navToggle.getAttribute('aria-expanded') === 'true';
                navToggle.setAttribute('aria-expanded', String(!expanded));
                navLinks.classList.toggle('open');
            });
            navLinks.querySelectorAll('a').forEach((link) => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('open');
                    navToggle.setAttribute('aria-expanded', 'false');
                });
            });
        }

        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starfield.appendChild(star);
        }
        for (let i = 0; i < 30; i++) {
            const dust = document.createElement('div');
            dust.className = 'dust-particle';
            dust.style.width = Math.random() * 3 + 1 + 'px';
            dust.style.height = dust.style.width;
            dust.style.left = Math.random() * 100 + '%';
            dust.style.top = Math.random() * 100 + '%';
            dust.style.animationDelay = Math.random() * 20 + 's';
            dust.style.animationDuration = Math.random() * 10 + 15 + 's';
            starfield.appendChild(dust);
        }
    </script>
</body>
</html>
